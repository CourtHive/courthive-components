name: Publish to npm

# Fires when a GitHub release is published. release-please creates
# the release via a GitHub-App-issued token (see release-please.yml),
# so the `release: published` event is delivered to this workflow.
# (The default GITHUB_TOKEN would silently drop the event under
# GitHub's loop-prevention rules.)
#
# `workflow_dispatch` is kept as a manual escape hatch — pass a
# `tag` input (e.g. `v1.0.4`) to publish a tag that already exists.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.0.4). Must already exist.'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Resolve tag
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.ref.outputs.tag }}

      - uses: pnpm/action-setup@v6
        # pnpm version is resolved from package.json's `packageManager` field.
        # Specifying `version:` here too makes the action error out with
        # "Multiple versions of pnpm specified" (ERR_PNPM_BAD_PM_VERSION).

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Strip link overrides for CI
        # Local-dev linkage (link:../factory etc.) is conventionally placed in
        # pnpm.overrides (package.json) and the overrides: block of
        # pnpm-workspace.yaml. Both are stripped here so CI resolves real
        # npm versions. We also abort if any link: value slips into the
        # dependency tables themselves (dependencies/devDependencies/
        # peerDependencies) — those are required to pin real versions for
        # publish. See https://github.com/CourtHive/courthive-components/...
        # for the v3.4.1 incident this guard prevents.
        run: |
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          if (pkg.pnpm?.overrides) {
            for (const k of Object.keys(pkg.pnpm.overrides))
              if (pkg.pnpm.overrides[k].startsWith('link:')) delete pkg.pnpm.overrides[k];
            if (!Object.keys(pkg.pnpm.overrides).length) delete pkg.pnpm.overrides;
            if (pkg.pnpm && !Object.keys(pkg.pnpm).length) delete pkg.pnpm;
          }
          const groups = ['dependencies', 'devDependencies', 'peerDependencies'];
          const offenders = [];
          for (const g of groups) {
            const t = pkg[g]; if (!t) continue;
            for (const [name, value] of Object.entries(t))
              if (typeof value === 'string' && value.startsWith('link:'))
                offenders.push(g + '.' + name + ' = ' + value);
          }
          if (offenders.length) {
            console.error('[publish] Refusing to publish: link: values found in dependency tables.');
            console.error('[publish] These must be pinned to real npm versions; move local linkage to pnpm.overrides or pnpm-workspace.yaml overrides:');
            for (const o of offenders) console.error('  - ' + o);
            process.exit(1);
          }
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          node -e "
          const fs = require('fs');
          const ws = 'pnpm-workspace.yaml';
          if (fs.existsSync(ws)) {
            let y = fs.readFileSync(ws, 'utf8');
            y = y.replace(/^overrides:\n(  [^\n]*\n)*/m, '');
            fs.writeFileSync(ws, y);
          }
          "
          rm -f pnpm-lock.yaml

      - run: pnpm install

      - run: pnpm lint

      - run: pnpm build

      - run: pnpm test

      # NOTE: Storybook play-function tests (build-storybook + test-storybook)
      # were removed from the publish gate. @storybook/test-runner@0.24.4's
      # injected harness fails on the Linux runner (StorybookTestRunnerError TDZ,
      # all stories fail) in a way that is not reproducible locally across node
      # 22/24, storybook 10.4.4/10.4.6, playwright 1.60/1.61 or factory 5.9/6.0 —
      # so it was blocking good releases without catching real regressions. The
      # stories are exercised locally (pnpm test-storybook) and can be re-added
      # to a PR check once the runner incompatibility is resolved.

      - name: Determine npm dist-tag
        id: distTag
        run: |
          VERSION="${{ steps.ref.outputs.version }}"
          if [[ "$VERSION" == *"-alpha"* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-beta"* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - run: npm publish --provenance --access public --tag ${{ steps.distTag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
